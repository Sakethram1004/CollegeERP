<style>
  #erd {
    padding: 8px 0;
  }

  #erd svg {
    width: 100%;
  }
</style>
<div id="erd"></div>
<script type="module">
  import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  await document.fonts.ready;
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    fontFamily: '"Anthropic Sans", sans-serif',
    themeVariables: {
      darkMode: dark,
      fontSize: '13px',
      fontFamily: '"Anthropic Sans", sans-serif',
      lineColor: dark ? '#9c9a92' : '#73726c',
      textColor: dark ? '#c2c0b6' : '#3d3d3a',
      primaryColor: dark ? '#2a2a3a' : '#f0f0ff',
      primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    },
  });

  const diagram = `erDiagram
  departments {
    TEXT id PK
    TEXT name
    TEXT hod
    INT  faculty
    INT  students
    INT  estd
    TEXT pg
  }
  students {
    TEXT id PK
    TEXT name
    TEXT dept FK
    INT  year
    INT  batch
    TEXT gender
    TEXT email
    TEXT status
    REAL cgpa
    TEXT fee_status
    REAL tuition
    REAL hostel
    REAL transport_fee
    REAL lab
    REAL exam
    REAL library
    REAL sports
    REAL development
    REAL admission
    REAL medical
    REAL placement
    REAL it_infra
    REAL paid
    REAL balance
    TEXT due_date
  }
  staff {
    TEXT id PK
    TEXT name
    TEXT dept FK
    TEXT role
    TEXT type
    TEXT qual
    INT  exp
    INT  publications
    TEXT status
    TEXT email
  }
  courses {
    TEXT code PK
    TEXT name
    TEXT dept FK
    INT  credits
    TEXT type
    TEXT faculty
    TEXT faculty_id FK
    INT  sem
    INT  students
  }
  attendance {
    TEXT id PK
    TEXT student_id FK
    TEXT dept FK
    TEXT date
    TEXT status
    TEXT month
    INT  year
    TEXT subject
    TEXT course_code FK
  }
  exams {
    TEXT id PK
    TEXT name
    TEXT dept
    TEXT type
    TEXT date
    TEXT status
    INT  total
    INT  hall_tickets
  }
  fees {
    TEXT id PK
    TEXT type
    REAL amount
    TEXT freq
    TEXT due_date
    REAL collected
    REAL pending
  }
  certificates {
    TEXT id PK
    TEXT type
    TEXT student
    TEXT student_id FK
    TEXT date
    TEXT status
    TEXT verif
  }
  publications {
    TEXT id PK
    TEXT title
    TEXT author
    TEXT staff_id FK
    TEXT journal
    INT  year
    TEXT type
    REAL impact
  }
  student_fees {
    INT  id PK
    TEXT student_id FK
    TEXT fee_id FK
    REAL amount_paid
    TEXT paid_date
    TEXT receipt_no
  }
  course_enrollment {
    INT  id PK
    TEXT student_id FK
    TEXT course_code FK
    INT  sem
    INT  academic_yr
    TEXT grade
  }

  departments ||--o{ students : "dept"
  departments ||--o{ staff : "dept"
  departments ||--o{ courses : "dept"
  departments ||--o{ attendance : "dept"

  students ||--o{ attendance : "student_id"
  students ||--o{ certificates : "student_id"
  students ||--o{ student_fees : "student_id"
  students ||--o{ course_enrollment : "student_id"

  staff ||--o{ courses : "faculty_id"
  staff ||--o{ publications : "staff_id"

  courses ||--o{ attendance : "course_code"
  courses ||--o{ course_enrollment : "course_code"

  fees ||--o{ student_fees : "fee_id"
`;

  const { svg } = await mermaid.render('erd-svg', diagram);
  document.getElementById('erd').innerHTML = svg;

  document.querySelectorAll('#erd svg .node').forEach(node => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '8');
    for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });

  document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
    p.setAttribute('stroke', 'none');
  });
</script>
